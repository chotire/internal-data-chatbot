<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Internal Data Chatbot — 비주얼 문서 목차</title>
<link rel="stylesheet" href="assets/theme.css" />
<link rel="stylesheet" href="assets/index.css" />
</head>
<body>
  <div class="wrap">
    <div class="kicker">Internal Data Chatbot · 김반장</div>
    <h1>문서 <span class="grad">목차</span></h1>
    <p class="lead">아키텍처를 시각적으로 정리한 슬라이드 데크 모음. 상세 정본은 각 카드의 <b>문서(.md)</b> 링크.</p>

    <div class="decks" id="decks">불러오는 중…</div>

    <div class="foot">
      데크 추가 = <code>slides/</code> 에 <code>v&lt;버전&gt;-&lt;슬러그&gt;.html</code> 파일을 두고
      <code>decks.json</code> 에 항목 한 줄 추가(이 목차는 자동 갱신). 공유 스타일은 <code>assets/theme.css</code> · <code>deck.css</code>.
    </div>
  </div>

  <script>
    const STATUS = {
      current: { label: "현재", cls: "current" },
      planned: { label: "예정", cls: "planned" },
      past:    { label: "과거", cls: "past" },
    };
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

    async function render() {
      const box = document.getElementById("decks");
      let decks;
      try {
        decks = await (await fetch("decks.json", { cache: "no-store" })).json();
      } catch (e) {
        box.textContent = "decks.json 을 불러오지 못했습니다: " + e.message;
        return;
      }
      box.innerHTML = "";
      for (const d of decks) {
        const st = STATUS[d.status] || STATUS.planned;
        const live = d.status !== "planned"; // 준비중이면 링크 비활성
        const a = document.createElement("a");
        a.className = "deck-card" + (live ? "" : " disabled");
        if (live) a.href = d.file;
        a.innerHTML =
          `<div class="row1"><span class="ver">${esc(d.version)}</span>` +
          `<h2>${esc(d.title)}</h2>` +
          `<span class="badge ${st.cls}">${st.label}</span></div>` +
          `<div class="desc">${esc(d.desc)}</div>` +
          `<div class="meta">` +
            (live ? `<span>▶ 데크 열기</span>` : `<span>🚧 준비 중</span>`) +
            (d.doc ? ` · <a href="${esc(d.doc)}" onclick="event.stopPropagation()">📄 문서(.md)</a>` : "") +
          `</div>`;
        box.appendChild(a);
      }
    }
    render();
  </script>
</body>
</html>
